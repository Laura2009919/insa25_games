<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väldi Ruute</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

h1{
    margin-bottom:10px;
}

#score{
    margin-bottom:15px;
    font-size:20px;
}

#game{
    width:500px;
    height:500px;
    background:#1e293b;
    border:4px solid #38bdf8;
    position:relative;
    overflow:hidden;
    border-radius:12px;
}

#player{
    width:40px;
    height:40px;
    background:#22c55e;
    position:absolute;
    left:230px;
    top:230px;
    border-radius:8px;
}

.enemy{
    width:35px;
    height:35px;
    background:#ef4444;
    position:absolute;
    border-radius:6px;
}

#gameover{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-size:40px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#38bdf8;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Väldi Ruute</h1>
<div id="score">Punktid: 0</div>

<div id="game">
    <div id="player"></div>

    <div id="gameover">
        <div>Mäng läbi!</div>
        <button onclick="restart()">Uuesti</button>
    </div>
</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const gameover = document.getElementById("gameover");

let x = 230;
let y = 230;
let score = 0;
let running = true;

const keys = {};
const enemies = [];

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function movePlayer(){
    if(!running) return;

    let speed = 5;

    if(keys["ArrowUp"] || keys["w"]) y -= speed;
    if(keys["ArrowDown"] || keys["s"]) y += speed;
    if(keys["ArrowLeft"] || keys["a"]) x -= speed;
    if(keys["ArrowRight"] || keys["d"]) x += speed;

    x = Math.max(0, Math.min(460, x));
    y = Math.max(0, Math.min(460, y));

    player.style.left = x + "px";
    player.style.top = y + "px";
}

function spawnEnemy(){
    if(!running) return;

    const enemy = document.createElement("div");
    enemy.className = "enemy";

    let ex = Math.random()*465;
    let ey = -40;
    let speed = 2 + Math.random()*3;

    enemy.style.left = ex + "px";
    enemy.style.top = ey + "px";

    game.appendChild(enemy);

    enemies.push({
        el:enemy,
        x:ex,
        y:ey,
        speed:speed
    });
}

function updateEnemies(){
    enemies.forEach(e => {
        e.y += e.speed;

        e.el.style.top = e.y + "px";

        if(
            e.x < x + 40 &&
            e.x + 35 > x &&
            e.y < y + 40 &&
            e.y + 35 > y
        ){
            endGame();
        }
    });
}

function updateScore(){
    if(!running) return;

    score++;
    scoreText.innerText = "Punktid: " + score;
}

function endGame(){
    running = false;
    gameover.style.display = "flex";
}

function restart(){
    enemies.forEach(e => e.el.remove());
    enemies.length = 0;

    x = 230;
    y = 230;
    score = 0;
    running = true;

    scoreText.innerText = "Punktid: 0";
    gameover.style.display = "none";
}

function loop(){
    movePlayer();
    updateEnemies();
    requestAnimationFrame(loop);
}

setInterval(spawnEnemy, 700);
setInterval(updateScore, 100);

loop();
</script>

</body>
</html>
